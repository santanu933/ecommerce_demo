<!DOCTYPE html><html><head><title>Store</title>
<style>body{font-family:Arial;margin:20px;background:#f4f4f4}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}.card,.panel{background:#fff;padding:15px;border-radius:10px}</style>
</head><body><h1>🛒 Ayata Store</h1><div id='products' class='grid'></div>
<div class='panel'><h2>Customer Details</h2>
<input id='name' placeholder='Name'><br><input id='phone' placeholder='Phone'><br>
<textarea id='address' placeholder='Address'></textarea><br>
<select id='payment'><option>COD</option><option>PREPAID</option></select>
<h3>Cart</h3><div id='cart'></div><h3 id='total'>₹0</h3>
<button onclick='placeOrder()'>Place Order</button><pre id='msg'></pre></div>
<script src="{{ url_for('static', filename='shop.js') }}"></script></body></html>
